name: 每日選股預測

on:
  schedule:
    - cron: '0 19 * * 0-4'   # UTC 19:00 = 台灣時間 03:00，週一～週五（給 FinMind 持股/法人資料更多同步時間）
  workflow_dispatch:           # 允許手動觸發（使用當下前一個交易日）

permissions:
  contents: write

jobs:
  predict:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Chinese font
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-wqy-zenhei

      - name: Run prediction
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: python predict.py

      - name: Export Telegram images
        run: |
          latest_xlsx=$(ls -t results/*.xlsx | head -1)
          limit_png="${latest_xlsx%.xlsx}_漲停候選.png"
          xgb_png="${latest_xlsx%.xlsx}_B_XGB獨立.png"

          echo "Latest Excel: $latest_xlsx"
          echo "Output PNG: $limit_png"
          echo "Output PNG: $xgb_png"

          python scripts/export_stock_snapshot.py "$latest_xlsx" "$limit_png" limit
          python scripts/export_stock_snapshot.py "$latest_xlsx" "$xgb_png" xgb

          echo "STOCK_IMAGES=$limit_png|$xgb_png" >> "$GITHUB_ENV"

      - name: Send Telegram image
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram secrets are not set. Skip sending image."
            exit 0
          fi

          IFS='|' read -ra images <<< "$STOCK_IMAGES"
          for image in "${images[@]}"; do
            if [ ! -f "$image" ]; then
              echo "Stock image not found: $image"
              exit 1
            fi

            caption="每日選股截圖：$(basename "$image" .png)"
            response=$(curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendPhoto" \
              -F chat_id="${TELEGRAM_CHAT_ID}" \
              -F caption="${caption}" \
              -F photo=@"${image}")

            echo "$response"
            RESPONSE="$response" python - <<'PY'
          import json, os, sys
          data = json.loads(os.environ["RESPONSE"])
          if not data.get("ok"):
              print("Telegram sendPhoto failed:")
              print(data)
              sys.exit(1)
          print("Telegram image sent successfully.")
          PY
          done

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add results/

          git diff --cached --quiet || git commit -m "📊 自動選股結果 $(date -u +%Y-%m-%d --date='8 hours')"
          git push
