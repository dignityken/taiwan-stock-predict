<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📊 台股績效驗證工具</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  <style>
    body { background: #f4f6f9; }
    .card { border: none; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
    canvas { max-height: 320px; }
    .hit  { color: #2e7d32; font-weight: bold; }
    .miss { color: #c62828; font-weight: bold; }
    th { white-space: nowrap; }
    td { white-space: nowrap; }
  </style>
</head>
<body>
<div class="container py-4">

  <h3 class="mb-1">📊 台股績效驗證工具</h3>
  <p class="text-muted mb-4">從 GitHub 選取預測 Excel → 自動補股價 → 計算績效 → 產出圖表</p>

  <!-- 控制列 -->
  <div class="card p-3 mb-3">
    <div class="row g-3 align-items-end">
      <div class="col-md-4">
        <label class="form-label fw-bold">📁 預測結果</label>
        <select id="fileSelect" class="form-select">
          <option>載入中...</option>
        </select>
      </div>
      <div class="col-md-3">
        <label class="form-label fw-bold">📅 驗證起始日</label>
        <input type="date" id="startDate" class="form-control">
      </div>
      <div class="col-md-3">
        <label class="form-label fw-bold">📆 驗證區間</label>
        <select id="nDays" class="form-select">
          <option value="1">隔日（1天）</option>
          <option value="3">後3日</option>
          <option value="5">後5日</option>
        </select>
      </div>
      <div class="col-md-2">
        <button id="runBtn" class="btn btn-success w-100" onclick="runVerify()">🚀 開始驗證</button>
      </div>
    </div>
  </div>

  <!-- 進度 -->
  <div id="progressArea" class="d-none mb-3">
    <div class="card p-3">
      <div id="progressText" class="mb-2 text-muted small">準備中...</div>
      <div class="progress" style="height:8px">
        <div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated bg-success" style="width:0%"></div>
      </div>
    </div>
  </div>

  <!-- 結果區 -->
  <div id="resultArea" class="d-none">

    <!-- 摘要卡片 -->
    <div id="summaryCards" class="row g-3 mb-3"></div>

    <!-- 圖表列 -->
    <div class="row g-3 mb-3">
      <div class="col-md-4">
        <div class="card p-3 h-100">
          <h6 class="text-center text-muted">各等級達標率</h6>
          <canvas id="chartHitRate"></canvas>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card p-3 h-100">
          <h6 class="text-center text-muted">各等級平均漲幅</h6>
          <canvas id="chartAvgReturn"></canvas>
        </div>
      </div>
      <div class="col-md-4 d-none" id="dailyChartCol">
        <div class="card p-3 h-100">
          <h6 class="text-center text-muted">逐日平均漲幅走勢</h6>
          <canvas id="chartDaily"></canvas>
        </div>
      </div>
    </div>

    <!-- A+B 個股圖 -->
    <div class="card p-3 mb-3">
      <h6 class="text-center text-muted">A+B 個股區間最高漲幅（綠=達標 紅=未達｜藍框=A 橘框=B）</h6>
      <canvas id="chartStocks" style="max-height:380px"></canvas>
    </div>

    <!-- 明細表 -->
    <div class="card p-3 mb-3">
      <div class="d-flex justify-content-between align-items-center mb-2">
        <h6 class="mb-0">📋 A+B 明細</h6>
        <button class="btn btn-sm btn-outline-primary" onclick="exportExcel()">📥 下載 Excel</button>
      </div>
      <div class="table-responsive">
        <table class="table table-sm table-hover table-bordered align-middle">
          <thead class="table-light" id="detailHead"></thead>
          <tbody id="detailBody"></tbody>
        </table>
      </div>
    </div>

  </div><!-- /resultArea -->
</div><!-- /container -->

<script>
// ── 設定 ────────────────────────────────────────────
const REPO  = 'dignityken/taiwan-stock-predict';
const FM_TOKEN = 'eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJkYXRlIjoiMjAyNi0wNC0wOSAwMDoxNjoyMCIsInVzZXJfaWQiOiJkaWduaXR5a2VuIiwiZW1haWwiOiJ6MDkxMjA5NjQ3MEBnbWFpbC5jb20iLCJpcCI6IjExOC4xNjkuMTQwLjE5OCJ9.x99Wo6d4oAFk0ALHY8q2zh7Huyd9SrWyMrRRc6I216E';

let allData = [], chartInstances = {};

// ── 初始化：載入 results/ 檔案列表 ──────────────────
async function loadFileList() {
  const sel = document.getElementById('fileSelect');
  try {
    const res   = await fetch(`https://api.github.com/repos/${REPO}/contents/results`);
    const files = await res.json();
    const xlsx  = files.filter(f => f.name.endsWith('.xlsx'))
                       .sort((a, b) => b.name.localeCompare(a.name));
    sel.innerHTML = xlsx.map(f =>
      `<option value="${f.download_url}">${f.name}</option>`
    ).join('');
    // 預設驗證起始日 = 今天
    document.getElementById('startDate').value = new Date().toISOString().split('T')[0];
  } catch(e) {
    sel.innerHTML = '<option>載入失敗，請重新整理頁面</option>';
  }
}

// ── 工具 ─────────────────────────────────────────────
const sleep = ms => new Promise(r => setTimeout(r, ms));

function addDays(dateStr, n) {
  const d = new Date(dateStr);
  d.setDate(d.getDate() + n);
  return d.toISOString().split('T')[0];
}

async function fetchPrice(sid, start, end, retries = 3) {
  for (let i = 0; i < retries; i++) {
    try {
      const url = `https://api.finmindtrade.com/api/v4/data` +
        `?dataset=TaiwanStockPrice&data_id=${sid}` +
        `&start_date=${start}&end_date=${end}&token=${FM_TOKEN}`;
      const res  = await fetch(url);
      const json = await res.json();
      if (json.status === 200) return json.data || [];
      await sleep(2000 * (i + 1));
    } catch(e) {
      await sleep(2000 * (i + 1));
    }
  }
  return [];
}

function setProgress(pct, text) {
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressText').textContent = text;
}

// ── 主流程 ────────────────────────────────────────────
async function runVerify() {
  const fileUrl   = document.getElementById('fileSelect').value;
  const startDate = document.getElementById('startDate').value;
  const nDays     = parseInt(document.getElementById('nDays').value);

  if (!startDate) { alert('請選擇驗證起始日'); return; }

  // 清舊圖表
  Object.values(chartInstances).forEach(c => c.destroy());
  chartInstances = {};
  document.getElementById('resultArea').classList.add('d-none');
  document.getElementById('progressArea').classList.remove('d-none');
  document.getElementById('runBtn').disabled = true;

  try {
    // 1. 下載 Excel
    setProgress(3, '下載預測 Excel...');
    const excelRes = await fetch(fileUrl);
    const buf      = await excelRes.arrayBuffer();
    const wb       = XLSX.read(buf, { type: 'array' });
    const ws       = wb.Sheets['全部'];
    const rows     = XLSX.utils.sheet_to_json(ws);
    if (!rows.length) { alert('Excel 讀取失敗或無資料'); return; }

    // 2. 逐股抓價
    const fetchEnd = addDays(startDate, nDays * 2 + 5);

    for (let i = 0; i < rows.length; i++) {
      const row     = rows[i];
      const sid     = String(row['代號']);
      const closePx = parseFloat(row['預測日收盤']);
      const pct     = 3 + Math.round(i / rows.length * 90);
      setProgress(pct, `[${i+1}/${rows.length}] ${sid} ${row['股名']}`);

      await sleep(500);
      const prices = await fetchPrice(sid, startDate, fetchEnd);
      const days   = prices
        .filter(p => p.date >= startDate)
        .sort((a, b) => a.date.localeCompare(b.date))
        .slice(0, nDays);

      if (!days.length) { row['達標(1.5%)'] = '?'; continue; }

      let maxH = -Infinity, lastC = null;
      days.forEach((p, idx) => {
        const h = +((parseFloat(p.max)   - closePx) / closePx * 100).toFixed(2);
        const c = +((parseFloat(p.close) - closePx) / closePx * 100).toFixed(2);
        const o = +((parseFloat(p.open)  - closePx) / closePx * 100).toFixed(2);
        row[`D${idx+1}_高漲%`] = h;
        row[`D${idx+1}_收漲%`] = c;
        row[`D${idx+1}_開漲%`] = o;
        if (h > maxH) maxH = h;
        lastC = c;
      });

      row['區間最高漲%'] = maxH;
      row['區間收盤漲%'] = lastC;
      row['達標(1.5%)']  = maxH >= 1.5 ? '✅' : '❌';
    }

    allData = rows;
    setProgress(100, '完成！');
    renderResults(rows, nDays, startDate);
    document.getElementById('resultArea').classList.remove('d-none');

  } catch(e) {
    alert('發生錯誤：' + e.message);
    console.error(e);
  } finally {
    document.getElementById('runBtn').disabled = false;
  }
}

// ── 渲染結果 ──────────────────────────────────────────
function renderResults(rows, nDays, startDate) {
  const GRADES  = ['A 強訊號', 'B XGB獨立', 'C Tree獨立'];
  const COLORS  = ['#1976D2', '#E65100', '#2E7D32'];
  const BCLS    = ['primary', 'warning', 'success'];
  const valid   = rows.filter(r => r['達標(1.5%)'] === '✅' || r['達標(1.5%)'] === '❌');

  // 計算統計
  const stats = {};
  GRADES.forEach((g, gi) => {
    const sub = valid.filter(r => r['等級'] === g);
    if (!sub.length) return;
    const hits = sub.filter(r => r['達標(1.5%)'] === '✅').length;
    const avg  = arr => arr.reduce((a,b)=>a+b,0) / arr.length;
    const dailyH = [], dailyC = [];
    for (let d = 1; d <= nDays; d++) {
      const hv = sub.map(r=>r[`D${d}_高漲%`]).filter(v=>v!=null);
      const cv = sub.map(r=>r[`D${d}_收漲%`]).filter(v=>v!=null);
      if (hv.length) dailyH.push(avg(hv));
      if (cv.length) dailyC.push(avg(cv));
    }
    stats[g] = {
      n: sub.length, hits,
      hitRate:  hits / sub.length * 100,
      avgHigh:  avg(sub.map(r=>r['區間最高漲%']).filter(v=>v!=null)),
      avgClose: avg(sub.map(r=>r['區間收盤漲%']).filter(v=>v!=null)),
      dailyH, dailyC, color: COLORS[gi], bcls: BCLS[gi]
    };
  });
  const gs = GRADES.filter(g => stats[g]);

  // 摘要卡片
  document.getElementById('summaryCards').innerHTML = gs.map(g => `
    <div class="col-md-4">
      <div class="card p-3 border-${stats[g].bcls} border-2">
        <h6 class="text-${stats[g].bcls} mb-3">${g}（${stats[g].n} 檔）</h6>
        <div class="row text-center g-2">
          <div class="col">
            <div class="fs-3 fw-bold">${stats[g].hitRate.toFixed(1)}%</div>
            <div class="text-muted small">達標率</div>
          </div>
          <div class="col">
            <div class="fs-3 fw-bold text-primary">${stats[g].avgHigh.toFixed(2)}%</div>
            <div class="text-muted small">均最高漲</div>
          </div>
          <div class="col">
            <div class="fs-3 fw-bold ${stats[g].avgClose>=0?'text-success':'text-danger'}">${stats[g].avgClose.toFixed(2)}%</div>
            <div class="text-muted small">均收盤漲</div>
          </div>
        </div>
      </div>
    </div>
  `).join('');

  // 圖1：達標率
  chartInstances.hit = new Chart(document.getElementById('chartHitRate'), {
    type: 'bar',
    data: {
      labels: gs,
      datasets: [{
        data: gs.map(g => +stats[g].hitRate.toFixed(1)),
        backgroundColor: gs.map(g => stats[g].color + 'BB'),
        borderColor:     gs.map(g => stats[g].color),
        borderWidth: 2
      }]
    },
    options: {
      plugins: { legend: { display: false } },
      scales:  { y: { max: 100, title: { display: true, text: '%' } } }
    }
  });

  // 圖2：平均漲幅
  chartInstances.avg = new Chart(document.getElementById('chartAvgReturn'), {
    type: 'bar',
    data: {
      labels: gs,
      datasets: [
        { label: '區間最高漲%', data: gs.map(g => +stats[g].avgHigh.toFixed(2)),
          backgroundColor: '#2196F3BB', borderColor: '#2196F3', borderWidth: 2 },
        { label: '區間收盤漲%', data: gs.map(g => +stats[g].avgClose.toFixed(2)),
          backgroundColor: '#FF9800BB', borderColor: '#FF9800', borderWidth: 2 }
      ]
    },
    options: { scales: { y: { title: { display: true, text: '%' } } } }
  });

  // 圖3：逐日（多日才顯示）
  if (nDays > 1) {
    document.getElementById('dailyChartCol').classList.remove('d-none');
    const dayLabels = Array.from({length: nDays}, (_, i) => `D${i+1}`);
    chartInstances.daily = new Chart(document.getElementById('chartDaily'), {
      type: 'line',
      data: {
        labels: dayLabels,
        datasets: gs.flatMap(g => [
          { label: `${g} 最高`, data: stats[g].dailyH.map(v=>+v.toFixed(2)),
            borderColor: stats[g].color, tension: 0.3, pointRadius: 4 },
          { label: `${g} 收盤`, data: stats[g].dailyC.map(v=>+v.toFixed(2)),
            borderColor: stats[g].color, borderDash: [5,5], tension: 0.3,
            backgroundColor: 'transparent', pointRadius: 3 }
        ])
      },
      options: {
        plugins: { legend: { labels: { boxWidth: 12, font: { size: 10 } } } },
        scales:  { y: { title: { display: true, text: '%' } } }
      }
    });
  } else {
    document.getElementById('dailyChartCol').classList.add('d-none');
  }

  // 圖4：A+B 個股
  const ab = valid
    .filter(r => r['等級'] === 'A 強訊號' || r['等級'] === 'B XGB獨立')
    .sort((a, b) => ({'A 強訊號':0,'B XGB獨立':1}[a['等級']] - {'A 強訊號':0,'B XGB獨立':1}[b['等級']])
                 || b['區間最高漲%'] - a['區間最高漲%']);

  chartInstances.stocks = new Chart(document.getElementById('chartStocks'), {
    type: 'bar',
    data: {
      labels: ab.map(r => r['股名'] + '\n' + r['代號']),
      datasets: [{
        data:            ab.map(r => r['區間最高漲%']),
        backgroundColor: ab.map(r => r['區間最高漲%'] >= 1.5 ? '#4CAF50BB' : '#F44336BB'),
        borderColor:     ab.map(r => r['等級'] === 'A 強訊號' ? '#1976D2' : '#E65100'),
        borderWidth: 2
      }]
    },
    options: {
      plugins: { legend: { display: false } },
      scales:  { y: { title: { display: true, text: '最高漲幅 (%)' } },
                 x: { ticks: { font: { size: 9 } } } }
    }
  });

  // 明細表
  const abAll   = rows.filter(r => r['等級'] === 'A 強訊號' || r['等級'] === 'B XGB獨立');
  const dayCols = [];
  for (let d = 1; d <= nDays; d++) dayCols.push(`D${d}_高漲%`, `D${d}_收漲%`);
  const hasFuturesCol = abAll.some(r => r['有期貨'] != null);
  const limitCols = ['漲停候選分數%','漲停模型驗證AP%','漲停樣本基準率%']
    .filter(c => abAll.some(r => r[c] != null));
  const cols = ['等級','代號','股名', ...(hasFuturesCol ? ['有期貨'] : []),
                'XGB信心%','Tree信心%', ...limitCols, '預測日收盤',
                ...dayCols, '區間最高漲%','區間收盤漲%','達標(1.5%)'];

  document.getElementById('detailHead').innerHTML =
    `<tr>${cols.map(c=>`<th>${c}</th>`).join('')}</tr>`;

  document.getElementById('detailBody').innerHTML = abAll.map(r => `
    <tr>
      ${cols.map(c => {
        const v = r[c];
        let cls = '';
        if (c.includes('漲%') && v != null) cls = v >= 1.5 ? 'hit' : (v < 0 ? 'miss' : '');
        if (c === '達標(1.5%)') cls = v === '✅' ? 'hit' : (v === '❌' ? 'miss' : '');
        const disp = typeof v === 'number' ? v.toFixed(2) : (v ?? '—');
        return `<td class="${cls}">${disp}</td>`;
      }).join('')}
    </tr>
  `).join('');
}

// ── 匯出 Excel ────────────────────────────────────────
function exportExcel() {
  if (!allData.length) return;
  const wb = XLSX.utils.book_new();
  ['A 強訊號','B XGB獨立','C Tree獨立'].forEach(g => {
    const sub = allData.filter(r => r['等級'] === g);
    if (sub.length) XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(sub), g.replace(' ','_'));
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(allData), '全部');
  const d = document.getElementById('startDate').value.replace(/-/g,'');
  const n = document.getElementById('nDays').value;
  XLSX.writeFile(wb, `績效驗證_${d}_後${n}日.xlsx`);
}

// 啟動
loadFileList();
</script>
</body>
</html>
